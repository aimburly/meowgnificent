<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meowgnificent — Product</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="toast" id="addedMsg">Added to cart!</div>

  <header class="header">
    <div class="header-inner container">
      <a href="index.html" class="logo"><img src="images/logo.svg" alt="Meowgnificent" height="36"></a>
      <nav class="nav">
        <a href="index.html" class="nav-link">&larr; Back to Shop</a>
        <button class="cart-btn" id="cartBtn" aria-label="Open cart">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span class="cart-count" id="cartCount">0</span>
        </button>
      </nav>
    </div>
  </header>

  <main class="product-detail container" id="productDetail"></main>

  <div class="cart-overlay" id="cartOverlay">
    <div class="cart-panel">
      <div class="cart-header">
        <h2>Your Cart</h2>
        <button class="cart-close" id="cartClose" aria-label="Close cart">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="cart-items" id="cartItems">
        <p class="cart-empty">Your cart is empty</p>
      </div>
      <div class="cart-footer">
        <div class="cart-total">
          <span>Total</span>
          <span id="cartTotal">$0.00</span>
        </div>
        <button class="btn btn-primary btn-full" id="checkoutBtn" disabled>Checkout</button>
        <p class="checkout-note">PayPal / Credit Card</p>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="container footer-inner">
      <p>&copy; 2026 Meowgnificent. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/product-detail.js"></script>
</body>
</html>
